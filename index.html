<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#1b5e20">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NEW START">
<title>NEW START 健康新生活 v16</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap&font-display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow-x:hidden}
body{font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;background:#1b5e20;transition:background 0.3s}
#root{min-height:100vh}
button{touch-action:manipulation}
input,textarea,select{font-size:16px !important;color-scheme:light}
#ns-root{transform-origin:top center;transition:zoom 0.3s}

/* ── v16 升級版載入畫面 ── */
#ld{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:linear-gradient(160deg,#1b5e20 0%,#2e7d32 40%,#1565C0 100%);
  z-index:9999;gap:0;
  transition:opacity 0.5s ease;
  overflow:hidden;
}
.ld-bg{
  position:absolute;
  border-radius:50%;
  background:rgba(255,255,255,0.04);
  animation:ldPulse 3s ease-in-out infinite;
}
.ld-bg1{width:300px;height:300px;top:-80px;right:-60px;animation-delay:0s;}
.ld-bg2{width:200px;height:200px;bottom:-40px;left:-40px;animation-delay:1s;}
.ld-inner{
  display:flex;flex-direction:column;align-items:center;
  gap:12px;position:relative;z-index:1;padding:0 32px;text-align:center;
}
.ld-icon{
  font-size:56px;line-height:1;margin-bottom:4px;
  animation:ldBounce 1.5s ease-in-out infinite;
}
.ld-title{
  font-size:30px;font-weight:900;letter-spacing:4px;color:#fff;
  text-shadow:0 2px 12px rgba(0,0,0,0.3);
}
.ld-sub{
  font-size:20px;font-weight:700;color:rgba(255,255,255,0.85);letter-spacing:2px;
}
.ld-ver{
  font-size:13px;color:rgba(255,255,255,0.5);letter-spacing:2px;margin-top:-4px;
}
.ld-bar{
  width:180px;height:4px;background:rgba(255,255,255,0.15);
  border-radius:2px;overflow:hidden;margin-top:8px;
}
.ld-bar-fill{
  height:100%;width:0;background:linear-gradient(90deg,#A5D6A7,#fff);
  border-radius:2px;animation:ldLoad 1.2s ease-out forwards;
}
.ld-verse{
  font-size:13px;color:rgba(255,255,255,0.65);
  line-height:1.8;max-width:260px;margin-top:8px;
  font-style:italic;
}
.ld-321{
  display:flex;gap:16px;margin-top:12px;
}
.ld-dot{
  width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.35);
  animation:ldDot 1.2s ease-in-out infinite;
}
.ld-dot:nth-child(2){animation-delay:0.15s;}
.ld-dot:nth-child(3){animation-delay:0.3s;}

@keyframes ldPulse{0%,100%{transform:scale(1);opacity:0.04}50%{transform:scale(1.1);opacity:0.07}}
@keyframes ldBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes ldLoad{0%{width:0}60%{width:70%}100%{width:100%}}
@keyframes ldDot{0%,100%{opacity:0.35;transform:scale(1)}50%{opacity:1;transform:scale(1.4)}}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="ld">
  <div class="ld-bg ld-bg1"></div>
  <div class="ld-bg ld-bg2"></div>
  <div class="ld-inner">
    <div class="ld-icon">🌿</div>
    <div class="ld-title">NEW START</div>
    <div class="ld-sub">健康新生活</div>
    <div class="ld-ver">v16.0 · 國度321空中團契</div>
    <div class="ld-bar"><div class="ld-bar-fill"></div></div>
    <div class="ld-verse">「你要保守你心，勝過保守一切，<br>因為一生的果效是由心發出。」<br>— 箴言 4:23</div>
    <div class="ld-321">
      <div class="ld-dot"></div>
      <div class="ld-dot"></div>
      <div class="ld-dot"></div>
    </div>
  </div>
</div>
<div id="root"></div>

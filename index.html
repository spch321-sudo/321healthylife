比書 4:13",tag:"信靠"},{text:"你要專心仰賴耶和華，不可倚靠自己的聰明。在你一切所行的事上，都要認定祂，祂必指引你的路。",ref:"箴言 3:5-6",tag:"信靠"},{text:"你們要將一切的憂慮卸給神，因為他顧念你們。",ref:"彼得前書 5:7",tag:"信靠"},{text:"應當一無掛慮，只要凡事藉著禱告、祈求和感謝，將你們所要的告訴神。",ref:"腓立比書 4:6",tag:"信靠"},{text:"耶和華是我的力量，是我的盾牌；我心裡倚靠他，就得幫助。",ref:"詩篇 28:7",tag:"信靠"},{text:"神是我們的避難所，是我們的力量，是我們在患難中隨時的幫助。",ref:"詩篇 46:1",tag:"信靠"},{text:"不要憂慮明天的事，因為明天自有明天的憂慮。",ref:"馬太福音 6:34",tag:"信靠"},{text:"謙卑是復興的鑰匙，無己是得勝的秘訣。",ref:"321理念",tag:"謙卑"},{text:"你們各人不要單顧自己的事，也要顧別人的事。",ref:"腓立比書 2:4",tag:"謙卑"},{text:"神阻擋驕傲的人，賜恩給謙卑的人。",ref:"彼得前書 5:5",tag:"謙卑"},{text:"只要存心謙卑，各人看別人比自己強。",ref:"腓立比書 2:3",tag:"謙卑"},{text:"我已經與基督同釘十字架，現在活著的不再是我，乃是基督在我裡面活著。",ref:"加拉太書 2:20",tag:"謙卑"},{text:"人的高傲必使他卑下；心裡謙遜的，必得尊榮。",ref:"箴言 29:23",tag:"謙卑"},{text:"心中快樂，面帶笑容；心裡憂愁，靈被損傷。",ref:"箴言 15:13",tag:"喜樂"},{text:"你們要靠主常常喜樂，我再說，你們要喜樂！",ref:"腓立比書 4:4",tag:"喜樂"},{text:"耶和華的喜樂是你們的力量。",ref:"尼希米記 8:10",tag:"喜樂"},{text:"神所賜出人意外的平安必在基督耶穌裡保守你們的心懷意念。",ref:"腓立比書 4:7",tag:"喜樂"},{text:"這是耶和華所定的日子，我們在其中要高興歡喜。",ref:"詩篇 118:24",tag:"喜樂"},{text:"你們要以感謝進入他的門，以讚美進入他的院。",ref:"詩篇 100:4",tag:"喜樂"},{text:"不要效法這個世界，只要心意更新而變化，叫你們察驗何為神的善良、純全、可喜悅的旨意。",ref:"羅馬書 12:2",tag:"成長"},{text:"所以，無論何人在基督裡，他就是新造的人，舊事已過，都變成新的了！",ref:"哥林多後書 5:17",tag:"成長"},{text:"我深信那在你們心裡動了善工的，必成全這工，直到耶穌基督的日子。",ref:"腓立比書 1:6",tag:"成長"},{text:"我們不喪膽，外體雖然毀壞，內心卻一天新似一天。",ref:"哥林多後書 4:16",tag:"成長"},{text:"你們要先求他的國和他的義，這些東西都要加給你們了。",ref:"馬太福音 6:33",tag:"成長"},{text:"你要盡心、盡性、盡力愛耶和華你的神。",ref:"申命記 6:5",tag:"關係"},{text:"我賜給你們一條新命令，乃是叫你們彼此相愛，我怎樣愛你們，你們也要怎樣相愛。",ref:"約翰福音 13:34",tag:"關係"},{text:"愛是恆久忍耐，又有恩慈；愛是不嫉妒，不自誇，不張狂。",ref:"哥林多前書 13:4",tag:"關係"},{text:"兩個人總比一個人好，因為二人勞碌同得美好的果效。",ref:"傳道書 4:9",tag:"關係"},{text:"鐵磨鐵，磨出刃來；朋友相感也是如此。",ref:"箴言 27:17",tag:"關係"},{text:"活出基督，成為得勝者。",ref:"321理念",tag:"得勝"},{text:"靠著愛我們的主，在這一切的事上已經得勝有餘了。",ref:"羅馬書 8:37",tag:"得勝"},{text:"在世上你們有苦難，但你們可以放心，我已經勝了世界。",ref:"約翰福音 16:33",tag:"得勝"},{text:"我的恩典夠你用的，因為我的能力是在人的軟弱上顯得完全。",ref:"哥林多後書 12:9",tag:"得勝"},{text:"那美好的仗我已經打過了，當跑的路我已經跑盡了，所信的道我已經守住了。",ref:"提摩太後書 4:7",tag:"得勝"},{text:"凡從神生的，就勝過世界；使我們勝了世界的，就是我們的
